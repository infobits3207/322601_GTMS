{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/stylesheet.css' %}">
    
    {% block extra_head %} {% endblock %}
    <style>
      :root {
        --GTMS-sidebar-text: var(--GTMS-text-secondary);
        --GTMS-sidebar-active-bg: #e6f1fb;
        --GTMS-sidebar-active-text: #185fa5;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0; background: var(--GTMS-secondary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        
      }
      .page-container { display: flex; min-height: 100vh; }

      /* ---------- Sidebar ---------- */
      .sidebar {
        width: 170px; flex-shrink: 0;
        display: flex; flex-direction: column;
        background-color: white; padding: 1.25rem 0.75rem;
        border-right: 1px solid var(--GTMS-secondary-dark);
      }
      .sidebar-brand {
        display: flex; align-items: center; gap: 10px;
        padding: 0 0.5rem 1.25rem; margin-bottom: 0.75rem;
        border-bottom: 1px solid var(--GTMS-secondary-dark);
      }
      .sidebar-brand-mark {
        width: 32px; height: 32px;
        border-radius: 8px; color: #fff;
        background: var(--GTMS-primary);
        display: flex; align-items: center;
        justify-content: center;
        font-size: 14px; font-weight: 600;
      }
      .sidebar-brand-name {
        font-size: 15px; font-weight: 600; 
        color: var(--GTMS-text-primary);
      }
      .sidebar-nav {
        display: flex; gap: 2px;
        flex-direction: column;
      }
      .sidebar-link {
        display: flex; align-items: center;
        gap: 10px; padding: 9px 10px;
        border-radius: 8px; color: var(--GTMS-sidebar-text);
        font-size: 14px; text-decoration: none;
        transition: background-color 0.15s ease, color 0.15s ease;
      }
      .sidebar-link i { font-size: 18px; width: 18px; text-align: center; }
      .sidebar-link:hover {
        background-color: #f1efe8;
        color: var(--GTMS-text-primary);
      }
      .sidebar-link.active {
        background-color: var(--GTMS-sidebar-active-bg);
        color: var(--GTMS-sidebar-active-text);
        font-weight: 500;
      }
      .sidebar-link:focus-visible {
        outline: 2px solid var(--GTMS-sidebar-active-text);
        outline-offset: 1px;
      }

      /* ---------- Main content ---------- */
      .main-content { flex: 1; padding: 10px; }
    </style>
  </head>
  <body>
    <div class="page-container">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-mark">G</div>
          <span class="sidebar-brand-name">GTMS</span>
        </div>

        <nav class="sidebar-nav">
          <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
            <span class="label-text">Dashboard</span>
          </a>
          <a href="#" class="sidebar-link {% if request.resolver_match.url_name == 'buyers' %}active{% endif %}">
            <i class="ti ti-users" aria-hidden="true"></i>
            <span class="label-text">Buyers</span>
          </a>
          <a href="{% url 'supplier:suppliers_list' %}" class="sidebar-link {% if request.resolver_match.url_name == 'suppliers_list' %}active{% endif %}">
            <i class="ti ti-building-factory-2" aria-hidden="true"></i>
            <span class="label-text">Suppliers</span>
          </a>
          <a href="{% url 'enquiry:enquiry_list' %}" class="sidebar-link {% if request.resolver_match.url_name == 'enquiry_list' %}active{% endif %}">
            <i class="ti ti-message-2" aria-hidden="true"></i>
            <span class="label-text">Enquiry</span>
          </a>
          <a href="#" class="sidebar-link {% if request.resolver_match.url_name == 'config' %}active{% endif %}">
            <i class="ti ti-settings" aria-hidden="true"></i>
            <span class="label-text">Config</span>
          </a>
        </nav>
      </aside>

      <main class="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
    {% block modals %}{% endblock %}
  </body>

  {% block extra_script %}{% endblock %}
</html>
