{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="{% static 'css/stylesheet.css' %}">
    
    {% block extra_head %} {% endblock %}
    <style>
      :root {
        --GTMS-sidebar-text: var(--GTMS-text-secondary);
        --GTMS-sidebar-active-bg: #e6f1fb;
        --GTMS-sidebar-active-text: #185fa5;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0; background: var(--GTMS-secondary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        
      }
      .page-container { display: flex; min-height: 100vh; }

      /* ---------- Sidebar ---------- */
      .sidebar {
        width: 170px; flex-shrink: 0;
        display: flex; flex-direction: column;
        background-color: white; padding: 1.25rem 0.75rem;
        border-right: 1px solid var(--GTMS-secondary-dark);
      }
      .sidebar-brand {
        display: flex; align-items: center; gap: 10px;
        padding: 0 0.5rem 1.25rem; margin-bottom: 0.75rem;
        border-bottom: 1px solid var(--GTMS-secondary-dark);
      }
      .sidebar-brand-mark {
        width: 32px; height: 32px;
        border-radius: 8px; color: #fff;
        background: var(--GTMS-primary);
        display: flex; align-items: center;
        justify-content: center;
        font-size: 14px; font-weight: 600;
      }
      .sidebar-brand-name {
        font-size: 15px; font-weight: 600; 
        color: var(--GTMS-text-primary);
      }
      .sidebar-nav {
        display: flex; gap: 2px;
        flex-direction: column;
      }
      .sidebar-link {
        display: flex; align-items: center;
        gap: 10px; padding: 9px 10px;
        border-radius: 8px; color: var(--GTMS-sidebar-text);
        font-size: 14px; text-decoration: none;
        transition: background-color 0.15s ease, color 0.15s ease;
      }
      .sidebar-link i { font-size: 18px; width: 18px; text-align: center; }
      .sidebar-link:hover {
        background-color: #f1efe8;
        color: var(--GTMS-text-primary);
      }
      .sidebar-link.active {
        background-color: var(--GTMS-sidebar-active-bg);
        color: var(--GTMS-sidebar-active-text);
        font-weight: 500;
      }
      .sidebar-link:focus-visible {
        outline: 2px solid var(--GTMS-sidebar-active-text);
        outline-offset: 1px;
      }

      /* ---------- Main content ---------- */
      .main-content { flex: 1; padding: 10px; }

      /* ----- Import notes style ----- */
      .template-strip {
        display: flex; align-items: center; justify-content: space-between;
        background: #fff; border: 0.5px solid var(--GTMS-secondary-dark, #e5e3da);
        border-radius: 10px; padding: 12px 16px; margin-bottom: 1rem; gap: 12px;
      }
      .template-strip-left { display: flex; align-items: center; gap: 10px; }
      .template-icon {
        width: 36px; height: 36px; border-radius: 8px;
        background: #eaf3de; color: #3b6d11;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; flex-shrink: 0;
      }
      .template-text .t-title {
        font-size: 13px; font-weight: 600;
        color: var(--GTMS-text-primary, #2c2c2a); margin: 0 0 2px;
      }
      .template-text .t-sub {
        font-size: 11px; color: var(--GTMS-text-muted, #888780); margin: 0;
      }

      /* ── file input ── */
      .upload-label {
        font-size: 12px; font-weight: 500;
        color: var(--GTMS-text-secondary, #5f5e5a);
        display: block; margin-bottom: 6px;
      }

      /* ── notes section ── */
      .import-notes { margin-top: 1rem; }
      .notes-toggle {
        display: flex; align-items: center; justify-content: space-between;
        cursor: pointer; padding: 10px 14px;
        background: #fff; border: 0.5px solid var(--GTMS-secondary-dark, #e5e3da);
        border-radius: 10px; user-select: none;
        transition: border-color .15s;
      }
      .notes-toggle:hover { border-color: #c5c3ba; }
      .notes-toggle-left { display: flex; align-items: center; gap: 8px; }
      .notes-toggle-left i { font-size: 16px; color: #185fa5; }
      .notes-toggle-title {
        font-size: 13px; font-weight: 600;
        color: var(--GTMS-text-primary, #2c2c2a);
      }
      .notes-toggle-sub {
        font-size: 11px; color: var(--GTMS-text-muted, #888780); margin-left: 4px;
      }
      .notes-chevron {
        font-size: 16px; color: var(--GTMS-text-muted, #888780);
        transition: transform .2s;
      }
      .notes-body {
        display: none;
        border: 0.5px solid var(--GTMS-secondary-dark, #e5e3da);
        border-top: none; border-radius: 0 0 10px 10px;
        background: #fff; overflow: hidden;
      }
      .notes-body.open { display: block; }
      .notes-toggle.open { border-radius: 10px 10px 0 0; }
      .notes-toggle.open .notes-chevron { transform: rotate(180deg); }
    </style>
  </head>
  <body>
    <div class="page-container">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="sidebar-brand-mark">G</div>
          <span class="sidebar-brand-name">GTMS</span>
        </div>

        <nav class="sidebar-nav">
          <a href="{% url 'dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="ti ti-layout-dashboard" aria-hidden="true"></i>
            <span class="label-text">Dashboard</span>
          </a>
          <a href="{% url 'buyer:buyer_list' %}" class="sidebar-link {% if request.resolver_match.app_name == 'buyer' %}active{% endif %}">
            <i class="ti ti-users" aria-hidden="true"></i>
            <span class="label-text">Buyers</span>
          </a>
          <a href="{% url 'supplier:suppliers_list' %}" class="sidebar-link {% if request.resolver_match.app_name == 'supplier' %}active{% endif %}">
            <i class="ti ti-building-factory-2" aria-hidden="true"></i>
            <span class="label-text">Suppliers</span>
          </a>
          <a href="{% url 'enquiry:enquiry_list' %}" class="sidebar-link {% if request.resolver_match.app_name == 'enquiry' %}active{% endif %}">
            <i class="ti ti-message-2" aria-hidden="true"></i>
            <span class="label-text">Enquiry</span>
          </a>
          <a href="#" class="sidebar-link {% if request.resolver_match.url_name == 'config' %}active{% endif %}">
            <i class="ti ti-settings" aria-hidden="true"></i>
            <span class="label-text">Config</span>
          </a>
        </nav>
      </aside>

      <main class="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
    {% block modals %}{% endblock %}
  </body>
  {% block extra_script %}{% endblock %}
</html>
