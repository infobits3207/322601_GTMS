<style>
  .form-grid { gap: 10px; }
  .form-group select, .form-group input { margin-bottom: 0px;}
  .btn-custom:disabled { opacity: 0.5; cursor: not-allowed; }
</style>

<div class="email-panel">
  <form onsubmit="sendEmail(event, this)">
    {% csrf_token %}
    <input type="hidden" name="company_type" value="{{ company_type }}">
    <input type="hidden" name="company_id"  value="{{ company_id }}">

    <p class="email-panel-label">Send email</p>
    <div class="form-grid">
      <div class="form-group">
        <label>From</label>
        <select name="from_email">
          <option value="" selected disabled>Select mail</option>
          {% for key, acc in email_accounts.items %}
            <option value="{{ key }}">{{ acc.EMAIL_HOST_USER }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>To</label>
        <select name="to_email_select" onchange="handleEmailSelect(this)">
          <option value="" selected disabled>Select mail options</option>
          {% for c in to_email_list %}
            {% if c.Email %}<option value="{{ c.Email }}">{{ c.Email }}</option>{% endif %}
          {% endfor %}
          <option value="manual">Type manually</option>
        </select>
        <input type="email" name="to_email" class="email-input" placeholder="Enter email address">
        <a class="back-to-select" onclick="resetEmailSelect(this.closest('.form-grid'));return false">
          ← Pick from list
        </a>
      </div>

      <div class="form-group full">
        <label>Subject</label>
        <input type="text" name="subject" value="" placeholder="Email subject">
      </div>
      
      <div class="form-group full">
        <label>Message</label>
        <textarea name="content" placeholder="Write your message here…"></textarea>
      </div>
    </div>
    <div class="send-row">
      <button type="submit" class="btn-custom">
        <i class="ti ti-send" aria-hidden="true"></i> Send email
      </button>
      <span class="send-status"></span>
    </div>
  </form>
</div>

<script>
  function handleEmailSelect(select) {
    const input = select.nextElementSibling;  // the input right after the select
    const backLink = select.parentElement.querySelector('a');

    if (select.value === 'manual') {
      select.style.display = 'none';
      input.style.display  = 'block';
      input.value = '';
      input.focus();

      if (backLink) backLink.style.display = 'block';
    } else {
      input.value = select.value;  // keep input in sync so the form always submits to_email
    }
  }

  function resetEmailSelect(container) {
    console.log(container)
    const select = container.querySelector('select[name="to_email_select"]');
    const input  = container.querySelector('input[name="to_email"]');
    const link   = container.querySelector('a');
    select.style.display = '';
    select.value = '';
    input.style.display  = 'none';
    link.style.display   = 'none';
  }

  function sendEmail(event, form) {
    event.preventDefault();
    const btn    = form.querySelector('.btn-custom');
    const status = form.querySelector('.send-status');
    const data   = new FormData(form);

    // resolve to_email from select or manual input
    const select = form.querySelector('select[name="to_email_select"]');
    const input  = select ? select.nextElementSibling : null;
    if (input && input.style.display !== 'none') {
      data.set('to_email', input.value);
    } else if (select) {
      data.set('to_email', select.value);
    }

    if (!data.get('to_email') || !data.get('subject') || !data.get('content')) {
      status.textContent = 'To, subject and message are required.';
      status.className   = 'send-status error';
      return;
    }

    btn.disabled   = true;
    btn.innerHTML  = '<i class="ti ti-loader-2"></i> Sending…';
    status.textContent = '';
    status.className   = 'send-status';

    fetch("{% url 'send_company_email' %}", {
      method:  'POST',
      headers: { 'X-CSRFToken': data.get('csrfmiddlewaretoken') },
      body:    data,
    })
    .then(r => r.json())
    .then(res => {
      if (res.success) {
        status.textContent = '✓ Sent';
        status.className   = 'send-status success';
        form.querySelector('textarea[name="content"]').value = '';
      } else {
        status.textContent = res.error || 'Failed to send.';
        status.className   = 'send-status error';
      }
    })
    .catch(() => {
      status.textContent = 'Network error. Try again.';
      status.className   = 'send-status error';
    })
    .finally(() => {
      btn.disabled  = false;
      btn.innerHTML = '<i class="ti ti-send"></i> Send email';
    });
  }
</script>
